<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 pt-20">



<nav class="bg-blue-900 text-white fixed top-0 w-full z-50 shadow">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-4">

    <h1 class="font-bold text-xl">🎓 Smart School</h1>

    <button id="menuBtn" class="md:hidden text-3xl">☰</button>

    <div id="menu"
      class="hidden md:flex flex-col md:flex-row md:space-x-8
             absolute md:static top-16 left-0 w-full md:w-auto
             bg-blue-900 md:bg-transparent p-6 md:p-0">

      <a class="py-2 hover:text-yellow-300" href="index.html">Accueil</a>
      <a class="py-2 hover:text-yellow-300" href="about.html">École</a>
      <a class="py-2 hover:text-yellow-300" href="programs.html">Programmes</a>
      <a class="py-2 hover:text-yellow-300" href="teachers.html">Professeurs</a>

      <a class="bg-yellow-400 text-blue-900 px-4 py-2 rounded-lg font-semibold hover:bg-yellow-300"
         href="contact.html">
        Contact
      </a>

    </div>
  </div>
</nav>

<script>
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("menu");
  btn?.addEventListener("click", () => menu.classList.toggle("hidden"));
</script>

<section class="p-10 max-w-xl mx-auto">

<h1 class="text-3xl font-bold mb-6 text-center">Contact</h1>

<form action="https://formspree.io/f/mgordwak"
      method="POST"
      class="space-y-4 bg-white p-6 shadow rounded">

  <input type="text" name="name" placeholder="Nom"
         class="w-full p-3 border rounded" required>

  <input type="email" name="email" placeholder="Email"
         class="w-full p-3 border rounded" required>

  <textarea name="message" placeholder="Message"
            class="w-full p-3 border rounded h-32" required></textarea>

  <button class="bg-blue-900 text-white w-full py-3 rounded hover:bg-blue-800">
    Envoyer
  </button>

</form>

</section>



<div class="fixed bottom-4 right-4 flex flex-col gap-3 z-50">

  <a href="https://wa.me/22785516860"
     target="_blank"
     class="bg-green-500 text-white w-12 h-12 md:w-14 md:h-14
            flex items-center justify-center rounded-full shadow-lg
            text-xl md:text-2xl transition hover:scale-110">
    💬
  </a>

  <a href="https://t.me/winxaziz"
     target="_blank"
     class="bg-blue-500 text-white w-12 h-12 md:w-14 md:h-14
            flex items-center justify-center rounded-full shadow-lg
            text-xl md:text-2xl transition hover:scale-110">
    ✈️
  </a>

</div>
</body>
</html>
